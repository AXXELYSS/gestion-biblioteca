name: Java CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compilar con Javac
        run: javac src/com/biblioteca/*.java src/com/biblioteca/domain/*.java src/com/biblioteca/service/*.java src/com/biblioteca/strategy/*.java
